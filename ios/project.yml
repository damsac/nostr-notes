name: "NostrNotes"
options:
  bundleIdPrefix: dev.damsac
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  "NostrNotes":
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Bindings
        excludes:
          - "*.h"
          - "*.modulemap"
    dependencies:
      - framework: "Frameworks/nostr_notes_ffi.xcframework"
        embed: false
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        ENABLE_TESTABILITY: YES
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: "NostrNotes"
        UILaunchScreen: {}
  "NostrNotesTests":
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: NostrNotes
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/NostrNotes.app/NostrNotes"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: "NostrNotes"
